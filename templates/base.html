{% load static %}

<!DOCTYPE html>

<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1">


<link
href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">


<link
rel="stylesheet"
href="{% static 'css/style.css' %}">


</head>



<body>



<nav class="navbar navbar-expand-lg navx">

<div class="container">


<a

class="navbar-brand logo"

href="/"

>

🏥 MedSys

</a>



<button

class="navbar-toggler"

type="button"

data-bs-toggle="collapse"

data-bs-target="#navbar"

>

☰

</button>




<div

class="collapse navbar-collapse"

id="navbar"

>



<div

class="ms-auto nav-buttons"

>


<a

href="/"

class="nav-btn"

>

Home

</a>



<a

href="/doctors"

class="nav-btn"

>

Doctors

</a>




{% if user.is_authenticated %}



<a

href="/{{user.role}}_dashboard"

class="nav-btn"

>

Dashboard

</a>




<a

href="/logout"

class="logout-btn"

>

Logout

</a>



{% else %}




<a

href="/login"

class="nav-btn"

>

Login

</a>




<a

href="/register"

class="register-btn"

>

Register

</a>



{% endif %}



</div>


</div>


</div>


</nav>




<div class="container mt-4">

{% block content %}

{% endblock %}

</div>




<script src=

"https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">

</script>



</body>

</html>
