{% extends 'base.html' %}
{% block content %}

<div class="card">

<h2>

My Appointments

</h2>

<table class="table">

<tr>

<th>Doctor</th>

<th>Date</th>

<th>Time</th>

<th>Payment</th>

<th>Status</th>

</tr>


{% for i in a %}

<tr>

<td>

Dr {{i.doctor.user.username}}

</td>

<td>

{{i.date}}

</td>

<td>

{{i.time}}

</td>

<td>

{% if i.paid %}

Paid

{% else %}

Pending

{% endif %}

</td>

<td>

{{i.status}}

</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
