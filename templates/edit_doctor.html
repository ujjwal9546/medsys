{% extends 'base.html' %}

{% block content %}

<div class="form-card">

<h2>

Update Profile

</h2>


<form
method="POST"
enctype="multipart/form-data">

{% csrf_token %}


{% for field in f %}

<div class="form-group">

<label>

{{field.label}}

</label>

{{field}}

<div class="err">

{{field.errors}}

</div>

</div>

{% endfor %}


<button class="save-btn">

Save Profile

</button>


</form>

</div>

{% endblock %}
