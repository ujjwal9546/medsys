{% extends 'base.html' %}{% block content %}
<div class="card"><h2>Pending Users</h2>
<table class="table">
<tr><th>Name</th><th>Role</th><th></th></tr>
{% for i in users %}
<tr><td>{{i.username}}</td><td>{{i.role}}</td><td>
<a class="btn btn-success" href="/approve/{{i.id}}">Approve</a>
<a class="btn btn-danger" href="/reject/{{i.id}}">Reject</a>
</td></tr>
{% endfor %}
</table></div>
{% endblock %}
