{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">

👥 My Staffs

</h1>


<div class="row">

{% for i in staffs %}

<div class="col-md-4 mb-4">

<div class="card p-4 shadow border-0 rounded-4">

<h3>

{{i.user.name|default:i.user.username}}

</h3>

<p>

👤 Username:
{{i.user.username}}

</p>

<p>

📧 {{i.user.email}}

</p>

<p>

📱 {{i.user.phone}}

</p>

<p>

💼 {{i.designation}}

</p>

</div>

</div>

{% empty %}

<h3>

No staff added

</h3>

{% endfor %}

</div>

{% endblock %}
